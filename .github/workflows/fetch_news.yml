name: Fetch News Every 2 Hours 24/7

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Run news fetcher
        run: python fetch_news.py

      - name: Commit and push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "News update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
