name: Daily ML Prediction

on:
  schedule:
    - cron: '10 10 * * 1-5'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance xgboost scikit-learn pandas numpy google-generativeai requests feedparser

      - name: Run prediction script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python predict.py

      - name: Commit and push signal.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal.json
          git diff --staged --quiet || git commit -m "Signal update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
